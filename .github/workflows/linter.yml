name: CI

on: [push, pull_request]

jobs:
  flake8-lint:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    name: flake8 Lint
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
      - name: flake8 Lint
        run: |
          apk update && apk upgrade --no-cache
          apk add py3-flake8 --no-cache
          flake8 kpa

  shellcheck-lint:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    name: ShellCheck Lint
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
      - name: ShellCheck Lint
        run: |
          apk update && apk upgrade --no-cache
          apk add shellcheck --no-cache
          shellcheck mkpa.sh --format=diff --enable=all --shell=sh
